# IPEM PiHat configuration
# Copy this to config.yaml and edit for your installation.

# --- SPI ---
spi:
  bus: 0              # /dev/spidev0.x
  device: 0           # chip-select index (CE0 = 0, CE1 = 1)
  speed_hz: 200000    # 200 kHz; safe starting point — increase to 1000000 if comms are stable
  mode: 3             # DitroniX boards use SPI mode 3 (CPOL=1, CPHA=1)

# --- I2C / PCA9671 ---
# Out-of-the-box (all DIP switches OFF) the ATM90E36 /CS is routed through the
# PCA9671 I2C expander, NOT through Pi CE0.  Keep enabled: true unless you have
# flipped the "Local SPI" DIP switches to ON (which bypasses the expander).
i2c:
  enabled: true
  bus: 1
  pca9671_address: 0x20   # Default when all address DIP switches are OFF
  board_cs_bit: 9         # ATM /CS = PCA9671 Port1 bit1 = bit 9 of 16-bit word
  pca_idle_state: 0x03FF  # P0=0xFF, P1=0x03 — CS high + DMA ctrl (from DitroniX ref)

# --- Mains configuration ---
mains:
  nominal_voltage: 230    # V RMS (UK: 230, US: 120/240)
  line_frequency: 50      # Hz (UK/EU: 50, US: 60)
  phases: 1               # 1 for single-phase UK home; 3 for three-phase
  # Single-phase: V1P/V1N used; same voltage replicated to V2/V3 inputs on board.
  # Three-phase: V1/V2/V3 each connected independently.

# --- ATM90E36 calibration ---
# These are starting defaults for a standard IPEM PiHat with:
#   - Voltage: resistor divider (240kΩ × 7 : 1kΩ) on board
#   - Current: YHDC SCT-013-000 100A/50mA CT clamp
# Calibrate Ugain first against a known-good multimeter reading.
# Calibrate Igain against a known resistive load (rated wattage).
calibration:
  ugain: 64585        # Calibrated against multimeter (236.6V actual / 74.0V reported × 20200)
  igain_a: 33500      # Phase A current gain (SCT-013-000 default)
  igain_b: 33500      # Phase B — set to 0 if CT not connected
  igain_c: 33500      # Phase C — set to 0 if CT not connected
  igain_n: 0xFD7F     # Neutral line current gain (DitroniX default; 0 if not used)
  pga_gain: 0x0000    # PGA gain register MMode1: 0x0000 = ×1, 0x5555 = ×2
  mmode0: 0x0187      # Metering mode: 50 Hz, 3P4W — change to 0x0D87 for 60 Hz

# --- Voltage event thresholds ---
events:
  sag_threshold_volts: 207      # 90% of 230V — IEC 61000-4-11 standard dip threshold
  sag_hysteresis_volts: 5       # Voltage must recover to 212V before dip is considered "ended"
  swell_threshold_volts: 253    # 110% of 230V — IEC standard swell threshold
  swell_hysteresis_volts: 5     # Must drop to 248V before swell is considered "ended"
  pre_dip_buffer_seconds: 2.0   # How many seconds of history to keep before a dip starts

# --- GPIO (for hardware SAG interrupt) ---
gpio:
  enabled: true
  sag_interrupt_pin: 17         # BCM GPIO number connected to WarnOut or IRQ0 on PiHat
                                # Set enabled: false to use software-only sag detection

# --- Polling rates ---
polling:
  fast_hz: 100          # Voltage-only fast poll rate (Hz) — DipMonitor only
  sample_hz: 30         # Measurement sampling rate (Hz); 30 matches the ATM90E36's ~30 Hz Urms update
  flush_interval_s: 10  # Seconds between InfluxDB batch writes (~30 × 10 = 300 pts per flush)

# --- Local logging ---
logging:
  data_dir: data              # Relative to project root; will be created if absent
  sqlite_file: ipem.db        # SQLite database filename inside data_dir
  csv_enabled: true           # Also write CSV alongside SQLite
  retention_days: 90          # Delete measurements older than this (0 = keep forever)

# --- InfluxDB (optional — leave url blank to disable) ---
influxdb:
  url: "http://solar.illysky.io:8086"
  token: "F1Pibuj0Q-FcS7hHCUajblEi9W3hbsSjCeu5XqnQULCRu24VC06aebso3V0hTAvOOAQbB1iNeocYWYhARi9T4g=="
  org: "illysky"
